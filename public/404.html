<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>L'Étiquette</title>
    <script>
      // GitHub Pages serves this for unknown paths. For a project page the
      // first path segment is the repo name (segmentCount = 1); we keep it and
      // stash the rest in the query string, then index.html restores the route.
      (function () {
        var segmentCount = 1
        var l = window.location
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + segmentCount)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(segmentCount)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        )
      })()
    </script>
  </head>
  <body></body>
</html>
