name: Deploy to GitHub Pages

on:
  # Le site en ligne suit main. Le déploiement Pages n'est autorisé que
  # depuis main (règle d'environnement github-pages) ; on n'écoute donc
  # que main pour éviter des runs « deploy » voués à échouer sur les
  # branches de développement.
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions needed for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Served from https://kponseel.github.io/FrenchEtiquette/
          # Must match the repository name's exact case (Pages is case-sensitive).
          VITE_BASE: /FrenchEtiquette/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
